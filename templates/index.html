<script type="text/javascript">
        var gk_isXlsx = false;
        var gk_xlsxFileLookup = {};
        var gk_fileData = {};
        function filledCell(cell) {
          return cell !== '' && cell != null;
        }
        function loadFileData(filename) {
        if (gk_isXlsx && gk_xlsxFileLookup[filename]) {
            try {
                var workbook = XLSX.read(gk_fileData[filename], { type: 'base64' });
                var firstSheetName = workbook.SheetNames[0];
                var worksheet = workbook.Sheets[firstSheetName];

                // Convert sheet to JSON to filter blank rows
                var jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1, blankrows: false, defval: '' });
                // Filter out blank rows (rows where all cells are empty, null, or undefined)
                var filteredData = jsonData.filter(row => row.some(filledCell));

                // Heuristic to find the header row by ignoring rows with fewer filled cells than the next row
                var headerRowIndex = filteredData.findIndex((row, index) =>
                  row.filter(filledCell).length >= filteredData[index + 1]?.filter(filledCell).length
                );
                // Fallback
                if (headerRowIndex === -1 || headerRowIndex > 25) {
                  headerRowIndex = 0;
                }

                // Convert filtered JSON back to CSV
                var csv = XLSX.utils.aoa_to_sheet(filteredData.slice(headerRowIndex)); // Create a new sheet from filtered array of arrays
                csv = XLSX.utils.sheet_to_csv(csv, { header: 1 });
                return csv;
            } catch (e) {
                console.error(e);
                return "";
            }
        }
        return gk_fileData[filename] || "";
        }

    <script>
        // Shader background using Three.js
        const scene = new THREE.Scene();
        const camera = new THREE.Camera();
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        const material = new THREE.ShaderMaterial({
            uniforms: {
                time: { value: 0 },
                resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
                mouse: { value: new THREE.Vector2(0.5, 0.5) }
            },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                precision highp float;
                uniform float time;
                uniform vec2 resolution;
                uniform vec2 mouse; 
                varying vec2 vUv;

                float hash(vec2 p){
                    p = vec2(dot(p, vec2(127.1,311.7)), dot(p, vec2(269.5,183.3)));
                    return -1.0 + 2.0*fract(sin(p)*43758.5453123);
                }
                float noise(in vec2 p){
                    vec2 i = floor(p);
                    vec2 f = fract(p);
                    vec2 u = f*f*(3.0-2.0*f);
                    return mix(mix(hash(i + vec2(0.0,0.0)), hash(i + vec2(1.0,0.0)), u.x),
                               mix(hash(i + vec2(0.0,1.0)), hash(i + vec2(1.0,1.0)), u.x), u.y);
                }

                void main(){
                    vec2 uv = (gl_FragCoord.xy / resolution.xy);
                    vec2 p = uv*3.0;
                    float t = time*0.12;
                    float n = 0.0;
                    n += 0.55*noise(p + vec2(t, t*0.7));
                    n += 0.25*noise(p*1.8 + vec2(-t*0.4, t*0.9));
                    n += 0.15*noise(p*3.2 + vec2(t*0.8, -t*0.6));
                    n = smoothstep(0.2, 0.9, n);

                    vec2 m = mouse;
                    vec2 par = (uv - 0.5) * (m - 0.5) * 0.8;
                    float vig = smoothstep(1.1, 0.3, length(uv - 0.5 + par));

                    vec3 a = vec3(0.08, 0.01, 0.01);
                    vec3 b = vec3(0.75, 0.20, 0.20);
                    vec3 c = vec3(0.90, 0.18, 0.45);
                    vec3 d = vec3(1.00, 0.72, 0.45);
                    vec3 grad = a + b*cos(6.28318*(c* (n + uv.x*0.15 + t*0.05) + d));

                    vec3 col = mix(grad, vec3(0.05,0.03,0.05), 0.15) * vig;
                    gl_FragColor = vec4(col, 0.55);
                }
            `,
            transparent: true
        });

        const geometry = new THREE.PlaneGeometry(2, 2);
        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        // Shader overlay thứ hai: grid neon mềm động
        const canvasOverlay = document.getElementById('canvasOverlay');
        const renderer2 = new THREE.WebGLRenderer({ canvas: canvasOverlay, alpha: true, antialias: true });
        renderer2.setSize(window.innerWidth, window.innerHeight);
        const scene2 = new THREE.Scene();
        const camera2 = new THREE.Camera();
        const mat2 = new THREE.ShaderMaterial({
            uniforms: { time: { value: 0.0 }, res: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) } },
            vertexShader: `void main(){ gl_Position = vec4(position, 1.0); }`,
            fragmentShader: `
                precision highp float; uniform float time; uniform vec2 res;
                void main(){
                    vec2 uv = (gl_FragCoord.xy/res.xy)-0.5;
                    uv.x *= res.x/res.y;
                    float s = 0.5 + 0.5*sin(time*0.4);
                    vec2 g = uv*24.0;
                    vec2 f = fract(g)-0.5;
                    float d = min(abs(f.x), abs(f.y));
                    float glow = 0.02/(d+0.02);
                    vec3 col = vec3(0.9,0.25,0.35)*glow*0.08*s;
                    gl_FragColor = vec4(col, 0.35);
                }
            `,
            transparent: true
        });
        const mesh2 = new THREE.Mesh(new THREE.PlaneGeometry(2,2), mat2); scene2.add(mesh2);

        function animate() {
            material.uniforms.time.value += 0.9;
            renderer.render(scene, camera);
            mat2.uniforms.time.value += 1.0;
            renderer2.render(scene2, camera2);
            requestAnimationFrame(animate);
        }
        animate();

        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            material.uniforms.resolution.value.set(window.innerWidth, window.innerHeight);
            renderer2.setSize(window.innerWidth, window.innerHeight);
            mat2.uniforms.res.value.set(window.innerWidth, window.innerHeight);
        });

        window.addEventListener('pointermove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = 1.0 - e.clientY / window.innerHeight;
            material.uniforms.mouse.value.set(x, y);
        });

        // Lưu qua AJAX để không reload trang
        const output = document.getElementById('configOutput');
        const form = document.getElementById('configForm');
        form.addEventListener('submit', async (e)=>{
            e.preventDefault();
            const fd = new FormData(form);
            const params = new URLSearchParams();
            fd.forEach((v,k)=> params.append(k, v));
            try{
                const res = await fetch('/save', {
                    method: 'POST',
                    headers: { 'X-Requested-With': 'XMLHttpRequest', 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: params.toString()
                });
                if(res.ok){
                    showToast('Lưu cấu hình thành công!');
                } else {
                    showToast('Lỗi khi lưu cấu hình!', true);
                }
            }catch(err){
                showToast('Không thể kết nối máy chủ!', true);
            }
        });

        // Ripple effect cho tất cả nút có class btn-ripple
        document.querySelectorAll('.btn-ripple').forEach(btn => {
            btn.addEventListener('click', function (e) {
                const rect = this.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const ripple = document.createElement('span');
                ripple.className = 'rp';
                ripple.style.left = x + 'px';
                ripple.style.top = y + 'px';
                ripple.style.width = ripple.style.height = Math.max(rect.width, rect.height) + 'px';
                this.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
            });
        });

        // Toast thông báo
        const toast = document.getElementById('toast');
        function showToast(message, isError = false) {
            toast.textContent = message;
            toast.classList.toggle('error', !!isError);
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // Hiệu ứng con trỏ: đuôi sao bám theo và nổ khi click
        const cc = document.getElementById('cursorCanvas');
        const ctx = cc.getContext('2d');
        let particles = [];
        function resizeCC(){ cc.width = innerWidth; cc.height = innerHeight; }
        window.addEventListener('resize', resizeCC); resizeCC();

        let mouseX = innerWidth/2, mouseY = innerHeight/2;
        const trail = Array.from({length: 16}, () => ({x: mouseX, y: mouseY}));
        window.addEventListener('pointermove', (e)=>{ mouseX = e.clientX; mouseY = e.clientY; });
        window.addEventListener('click', (e)=>{
            const count = 12;
            for(let i=0;i<count;i++){
                const angle = Math.random()*Math.PI*2;
                const speed = 1.2+Math.random()*2.0;
                particles.push({
                    x: e.clientX,
                    y: e.clientY,
                    vx: Math.cos(angle)*speed,
                    vy: Math.sin(angle)*speed,
                    life: 22+Math.random()*12,
                    hue: 0| (350 + Math.random()*30)
                });
            }
        });
        function tick(){
            ctx.clearRect(0,0,cc.width,cc.height);

            trail[0].x += (mouseX - trail[0].x) * 0.35;
            trail[0].y += (mouseY - trail[0].y) * 0.35;
            for(let i=1;i<trail.length;i++){
                trail[i].x += (trail[i-1].x - trail[i].x) * 0.35;
                trail[i].y += (trail[i-1].y - trail[i].y) * 0.35;
            }
            for(let i=0;i<trail.length;i++){
                const p = trail[i];
                const t = 1 - i / trail.length;
                ctx.fillStyle = `rgba(255, 120, 120, ${0.25*t})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3.5*t, 0, Math.PI*2);
                ctx.fill();
            }

            particles = particles.filter(p=>p.life>0);
            for(const p of particles){
                p.life -= 1;
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.02;
                ctx.fillStyle = `hsla(${p.hue},100%,60%,${Math.max(0,p.life/36)})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 1.8, 0, Math.PI*2);
                ctx.fill();
            }
            requestAnimationFrame(tick);
        }
        tick();

        // Hiệu ứng khi click/focus vào ô nhập
        const fields = document.querySelectorAll('input, select');
        let audioCtx = null;
        function getAudioCtx(){
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            return audioCtx;
        }
        function playBlip(freq = 1100, duration = 0.06, gain = 0.08){
            try {
                const ctx = getAudioCtx();
                const now = ctx.currentTime;
                const osc = ctx.createOscillator();
                const amp = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, now);
                amp.gain.setValueAtTime(0.0001, now);
                amp.gain.exponentialRampToValueAtTime(gain, now + 0.01);
                amp.gain.exponentialRampToValueAtTime(0.0001, now + duration);
                osc.connect(amp).connect(ctx.destination);
                osc.start(now);
                osc.stop(now + duration + 0.02);
            } catch (e) { /* ignore */ }
        }
        fields.forEach(el => {
            el.addEventListener('focus', () => {
                el.classList.add('focus-ring');
                el.classList.add('pulse');
                setTimeout(()=> el.classList.remove('pulse'), 450);
                playBlip(1250, 0.08, 0.12);
            });
            el.addEventListener('blur', () => {
                el.classList.remove('focus-ring');
            });
            el.addEventListener('click', () => {
                el.classList.add('pulse');
                setTimeout(()=> el.classList.remove('pulse'), 420);
                playBlip(950, 0.08, 0.18);
            });
        });

        // YouTube IFrame API
        const YT_PLAYLIST_URL = 'https://www.youtube.com/watch?v=AhC2SbKd-bY&list=RDAhC2SbKd-bY&start_radio=1';
        const YT_VIDEO_ID = 'AhC2SbKd-bY';
        let ytPlayer = null;
        const btnPlayPause = document.getElementById('btnPlayPause');
        const volumeSlider = document.getElementById('volumeSlider');
        const volLabel = document.getElementById('volLabel');

        function loadYouTubeAPI(){
            const tag = document.createElement('script');
            tag.src = 'https://www.youtube.com/iframe_api';
            document.body.appendChild(tag);
        }
        loadYouTubeAPI();

        window.onYouTubeIframeAPIReady = function(){
            ytPlayer = new YT.Player('yt-player', {
                height: '0', width: '0', videoId: YT_VIDEO_ID,
                playerVars: {
                    autoplay: 1,
                    controls: 0,
                    disablekb: 1,
                    modestbranding: 1,
                    rel: 0,
                    playsinline: 1,
                    listType: 'playlist',
                    list: 'RDAhC2SbKd-bY',
                    loop: 1,
                    mute: 1
                },
                events: {
                    onReady: (e)=>{
                        const savedVol = +localStorage.getItem('ui_volume') || 60;
                        volumeSlider.value = savedVol;
                        volLabel.textContent = savedVol + '%';
                        try {
                            ytPlayer.mute();
                            ytPlayer.playVideo();
                        } catch(_){}
                        const unlock = ()=>{
                            try {
                                if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
                                ytPlayer.unMute();
                                ytPlayer.setVolume(+volumeSlider.value || 60);
                                ytPlayer.playVideo();
                            } catch(_){}
                            const hintEl = document.getElementById('unmuteHint');
                            if (hintEl) hintEl.style.display = 'none';
                            window.removeEventListener('pointerdown', unlock);
                            window.removeEventListener('keydown', unlock);
                        };
                        const hintEl = document.getElementById('unmuteHint');
                        if (hintEl) hintEl.style.display = 'block';
                        window.addEventListener('pointerdown', unlock, { once: true });
                        window.addEventListener('keydown', unlock, { once: true });
                    },
                    onStateChange: (ev)=>{
                        if (ev.data === YT.PlayerState.ENDED) {
                            try { ytPlayer.playVideo(); } catch(_){ }
                        }
                    }
                }
            });
        }

        function togglePlay(){
            if(!ytPlayer) return;
            const state = ytPlayer.getPlayerState ? ytPlayer.getPlayerState() : -1;
            if(state !== 1){
                try { ytPlayer.playVideo(); } catch(_){}
                btnPlayPause.textContent = '⏸';
            } else {
                try { ytPlayer.pauseVideo(); } catch(_){}
                btnPlayPause.textContent = '▶';
            }
        }
        btnPlayPause.addEventListener('click', (e)=>{
            e.preventDefault();
            togglePlay();
        });
        volumeSlider.addEventListener('input', ()=>{
            const v = +volumeSlider.value;
            volLabel.textContent = v + '%';
            localStorage.setItem('ui_volume', String(v));
            try {
                if(ytPlayer){
                    ytPlayer.unMute();
                    ytPlayer.setVolume(v);
                    const st = ytPlayer.getPlayerState ? ytPlayer.getPlayerState() : -1;
                    if (st !== 1) ytPlayer.playVideo();
                }
            } catch(_){ }
        });

        // Preset buttons: Legit & Rage
        const btnLegit = document.getElementById('btnLegit');
        const btnRage = document.getElementById('btnRage');
        const btnHideConsole = document.getElementById('btnHideConsole');
        function applyPreset(p){
            document.getElementById('phimKichHoat').value = p.hk;
            document.getElementById('doNhayMau').value = p.ct;
            document.getElementById('fovNgang').value = p.fx;
            document.getElementById('fovDoc').value = p.fy;
            document.getElementById('mauDich').value = p.col;
            document.getElementById('doMuot').value = p.sm;
            document.getElementById('offsetY').value = p.oy;
            document.getElementById('offsetX').value = p.ox;
            document.querySelector('button[type="submit"]').classList.add('pulse');
            setTimeout(()=>document.querySelector('button[type="submit"]').classList.remove('pulse'), 420);
        }
        btnLegit.addEventListener('click', ()=>{
            applyPreset({
                hk: 'x1', ct: 120, fx: 65, fy: 30, col: 'purple', sm: 12, oy: 4, ox: 0
            });
            showToast('Đã áp dụng Config Legit');
        });
        btnRage.addEventListener('click', ()=>{
            applyPreset({
                hk: 'x1', ct: 120, fx: 100, fy: 100, col: 'purple', sm: 1, oy: 3, ox: 0
            });
            showToast('Đã áp dụng Config Rage');
        });
        
        // Nút ẩn/hiện console
        let consoleHidden = false;
        btnHideConsole.addEventListener('click', ()=>{
            try {
                // Gửi lệnh ẩn/hiện console qua API
                fetch('/toggle-console', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: consoleHidden ? 'show' : 'hide' })
                }).then(() => {
                    consoleHidden = !consoleHidden;
                    btnHideConsole.textContent = consoleHidden ? 'Hiện Console' : 'Ẩn Console';
                    showToast(consoleHidden ? 'Đã ẩn console' : 'Đã hiện console');
                }).catch(() => {
                    showToast('Không thể điều khiển console', true);
                });
            } catch (e) {
                showToast('Lỗi khi điều khiển console', true);
            }
        });

        // Status Popup Functions
        function showStatusPopup() {
            const popup = document.getElementById('statusPopup');
            popup.classList.add('show');
        }

        function closeStatusPopup() {
            const popup = document.getElementById('statusPopup');
            popup.classList.remove('show');
        }

        function updateStatus(status, type = 'working') {
            const statusValue = document.querySelector('.status-value');
            const statusIndicator = document.querySelector('.status-indicator');
            
            statusValue.textContent = status;
            statusIndicator.className = `status-indicator ${type}`;
        }

        // Auto show popup when page loads
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(showStatusPopup, 1000); // Show after 1 second
        });

        // Auto hide popup after 5 seconds
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(function() {
                const popup = document.getElementById('statusPopup');
                if (popup.classList.contains('show')) {
                    closeStatusPopup();
                }
            }, 5000);
        });
    </script>
</body>
</html>
